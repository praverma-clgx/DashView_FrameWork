stages:
  - test

playwright-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.56.1-jammy
  
  # Manual trigger only - prevents automatic execution on push
  when: manual
  
  # Allow user to select environment
  variables:
    CI: 'true'
    TEST_ENV: 'first_general'  # Default environment, can be overridden

  before_script:
    - npm ci
    - npx playwright install --with-deps chromium
    - |
      cat << EOF > .env
      TEST_ENV=${TEST_ENV}
      FIRST_GENERAL_ENTERPRISE_LOGIN_URL=${FIRST_GENERAL_ENTERPRISE_LOGIN_URL}
      FIRST_GENERAL_ENTERPRISE_COMPANY_ID=${FIRST_GENERAL_ENTERPRISE_COMPANY_ID}
      FIRST_GENERAL_ENTERPRISE_USERNAME=${FIRST_GENERAL_ENTERPRISE_USERNAME}
      FIRST_GENERAL_ENTERPRISE_PASSWORD=${FIRST_GENERAL_ENTERPRISE_PASSWORD}
      PAUL_DEVIS_ENTERPRISE_LOGIN_URL=${PAUL_DEVIS_ENTERPRISE_LOGIN_URL}
      PAUL_DEVIS_ENTERPRISE_COMPANY_ID=${PAUL_DEVIS_ENTERPRISE_COMPANY_ID}
      PAUL_DEVIS_ENTERPRISE_USERNAME=${PAUL_DEVIS_ENTERPRISE_USERNAME}
      PAUL_DEVIS_ENTERPRISE_PASSWORD=${PAUL_DEVIS_ENTERPRISE_PASSWORD}
      SERVICE_MASTER_ENTERPRISE_LOGIN_URL=${SERVICE_MASTER_ENTERPRISE_LOGIN_URL}
      SERVICE_MASTER_ENTERPRISE_COMPANY_ID=${SERVICE_MASTER_ENTERPRISE_COMPANY_ID}
      SERVICE_MASTER_ENTERPRISE_USERNAME=${SERVICE_MASTER_ENTERPRISE_USERNAME}
      SERVICE_MASTER_ENTERPRISE_PASSWORD=${SERVICE_MASTER_ENTERPRISE_PASSWORD}
      EVANS_ENTERPRISE_LOGIN_URL=${EVANS_ENTERPRISE_LOGIN_URL}
      EVANS_ENTERPRISE_COMPANY_ID=${EVANS_ENTERPRISE_COMPANY_ID}
      EVANS_ENTERPRISE_USERNAME=${EVANS_ENTERPRISE_USERNAME}
      EVANS_ENTERPRISE_PASSWORD=${EVANS_ENTERPRISE_PASSWORD}
      EOF

  script:
    - npm run test

  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 30 days
    name: "playwright-report-${TEST_ENV}-${CI_COMMIT_SHORT_SHA}"

  # Removed automatic triggers - now manual only
  # only:
  #   - main
  #   - develop
  #   - merge_requests
